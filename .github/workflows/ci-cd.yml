name: CI-CD

on:
  push:
    branches:
      - main

env:
  IMAGE_REPOSITORY: registry.kubekalm.io/system/object-storage-docs-demo

jobs:
  build-test-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Build and test
        run: gradle --no-daemon clean test bootJar

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: registry.kubekalm.io
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_REPOSITORY }}:${{ github.sha }}
            ${{ env.IMAGE_REPOSITORY }}:main

  deploy:
    runs-on: ubuntu-latest
    needs:
      - build-test-push
    steps:
      - name: Trigger KubeKALM deploy
        env:
          API_BASE_URL: ${{ secrets.KUBEKALM_API_BASE_URL }}
          TENANT_ID: ${{ secrets.KUBEKALM_TENANT_ID }}
          APP_ID: ${{ secrets.KUBEKALM_APP_ID }}
          DEPLOY_TOKEN: ${{ secrets.KUBEKALM_DEPLOY_TOKEN }}
          IMAGE: ${{ env.IMAGE_REPOSITORY }}:${{ github.sha }}
        run: |
          set -euo pipefail
          payload=$(jq -nc --arg image "$IMAGE" '{image:$image}')
          curl -fsS -X POST "${API_BASE_URL}/tenants/${TENANT_ID}/apps/${APP_ID}/deploy" \
            -H "Authorization: Bearer ${DEPLOY_TOKEN}" \
            -H 'Content-Type: application/json' \
            -d "$payload" >/dev/null
